<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon Price Style Test</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #fff; }
    .card { background: #f0f0f0; padding: 20px; margin: 10px 0; border-radius: 8px; }

    /* Amazon style price */
    .a-price { font-size: 28px; font-weight: 500; color: #0F1111; }
    .a-price .a-price-symbol { font-size: 18px; vertical-align: top; margin-right: 2px; }
    .a-price .a-price-whole { font-size: 28px; font-weight: 500; }
    .a-price .a-price-fractional { font-size: 14px; vertical-align: top; }

    /* Large price */
    .price-large { font-size: 36px; font-weight: bold; color: #B12704; }
    .price-symbol { font-size: 20px; vertical-align: top; }
    .price-fraction { font-size: 16px; vertical-align: top; }

    .test-result { margin: 10px 0; padding: 10px; background: #e7f3ff; border-radius: 4px; font-family: monospace; }
  </style>
</head>
<body>
  <h1>Amazon Price Structure Test</h1>
  <p>Hover over prices to test recognition</p>

  <div class="card">
    <h2>Amazon Style Split Price</h2>
    <div class="a-price">
      <span class="a-price-symbol">$</span>
      <span class="a-price-whole">1,299</span>
      <span class="a-price-fractional">00</span>
    </div>
    <p>Parent element text: <code class="parent-text"></code></p>
  </div>

  <div class="card">
    <h2>Simple Large Price</h2>
    <div class="price-large">
      <span class="price-symbol">$</span>
      <span class="price-whole">2,499</span>
      <span class="price-fraction">99</span>
    </div>
  </div>

  <div class="card">
    <h2>Normal Price</h2>
    <p class="price">$19.99</p>
    <p class="price">$299</p>
  </div>

  <div class="test-result">
    <h3>Regex Test Results:</h3>
    <div id="log"></div>
  </div>

  <script>
    const PRICE_REGEX = /([$£€¥₽₹₩₺₴₿]|CNY|USD|EUR|GBP|JPY|RMB|HKD|TWD|KRW|INR|AUD|CAD|CHF|SEK|NOK|DKK|NZD|SGD|THB|MYR|PHP|IDR|VND)[\s\u00a0]?(\d{1,3}(,\d{3})*(\.\d{1,2})?|\d+(\.\d{1,2})?)/gi;

    const log = document.getElementById('log');

    function testPrice(text) {
      PRICE_REGEX.lastIndex = 0;
      const match = PRICE_REGEX.exec(text);
      return match ? match[0] : 'NO MATCH';
    }

    // Show parent text content for amazon style
    document.querySelectorAll('.a-price').forEach(el => {
      const text = el.textContent;
      const result = testPrice(text);
      el.parentElement.querySelector('.parent-text').textContent = `"${text}" -> ${result}`;

      el.addEventListener('mouseover', () => {
        console.log('[Test] Amazon price hovered:', text, '->', result);
      });
    });

    // Test all price elements
    document.querySelectorAll('.price, .price-large').forEach(el => {
      const text = el.textContent;
      const result = testPrice(text);
      const div = document.createElement('div');
      div.textContent = `"${text}" -> ${result}`;
      log.appendChild(div);
    });

    console.log('[Test] Page loaded. Hover over prices to test.');
  </script>
</body>
</html>
