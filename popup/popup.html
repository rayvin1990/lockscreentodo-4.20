<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Price to Hours</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Price to Hours</h1>
      <p class="subtitle">Convert prices into work time</p>
    </div>

    <div class="settings">
      <!-- Row 1: Income Amount + Income Type -->
      <div class="setting-row">
        <div class="setting-item income-amount-item">
          <label for="amount">Income Amount</label>
          <input type="number" id="amount" min="1" max="999999" step="1" value="3000">
        </div>
        <div class="setting-item income-type-item">
          <label for="incomeType">Income Type</label>
          <select id="incomeType">
            <option value="hourly">Hourly Pay</option>
            <option value="daily">Daily Pay</option>
            <option value="weekly">Weekly Pay</option>
            <option value="biweekly" selected>Biweekly Pay</option>
            <option value="monthly">Monthly Pay</option>
            <option value="yearly">Yearly Pay</option>
          </select>
        </div>
      </div>

      <!-- Row 2: Hours per Day (editable) -->
      <div class="setting-row">
        <div class="setting-item full-width">
          <label for="hoursPerDay">Hours per Day</label>
          <input type="number" id="hoursPerDay" min="1" max="24" step="0.5" value="8">
        </div>
      </div>

      <!-- Row 3: Enable Extension Toggle -->
      <div class="setting-row">
        <div class="setting-item toggle-item">
          <label>Enable Extension</label>
          <label class="switch">
            <input type="checkbox" id="extensionToggle">
            <span class="slider round"></span>
          </label>
        </div>
      </div>
    </div>

    <div class="actions">
      <button id="saveBtn" class="btn primary">Save Settings</button>
    </div>

    <div id="notification" class="notification"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
