<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon Price Test</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #fff; }
    .card { background: #f0f0f0; padding: 20px; margin: 10px 0; border-radius: 8px; }
    .a-price { font-size: 28px; color: #0F1111; display: inline-block; }
    .a-offscreen { position: absolute; left: -9999px; }
    .a-price-symbol { font-size: 18px; vertical-align: top; margin-right: 2px; }
    .a-price-whole { font-size: 28px; font-weight: 500; }
    .a-price-fractional { font-size: 14px; vertical-align: top; }
    .test-result { margin: 10px 0; padding: 10px; background: #e7f3ff; border-radius: 4px; font-family: monospace; }
    .success { color: green; }
    .fail { color: red; }
  </style>
</head>
<body>
  <h1>Amazon Price Structure Test</h1>
  <div class="card">
    <h2>Amazon Full Structure (with a-offscreen)</h2>
    <div class="a-price" data-price="1299.00">
      <span class="a-offscreen">$1,299.00</span>
      <span aria-hidden="true">
        <span class="a-price-symbol">$</span>
        <span class="a-price-whole">1,299</span>
        <span class="a-price-fractional">00</span>
      </span>
    </div>
    <div class="test-result" id="result1"></div>
  </div>
  <div class="card">
    <h2>Amazon Structure (no a-offscreen)</h2>
    <div class="a-price" data-price="2499.00">
      <span aria-hidden="true">
        <span class="a-price-symbol">$</span>
        <span class="a-price-whole">2,499</span>
        <span class="a-price-fractional">00</span>
      </span>
    </div>
    <div class="test-result" id="result2"></div>
  </div>
  <div class="card">
    <h2>Simple Prices</h2>
    <p class="price">$19.99</p>
    <p class="price">$299</p>
    <p class="price">$5,999</p>
    <div class="test-result" id="result3"></div>
  </div>
  <script>
    const PRICE_REGEX = /([$£€¥₽₹₩₺₴₿]|CNY|USD|EUR|GBP|JPY|RMB|HKD|TWD|KRW|INR|AUD|CAD|CHF|SEK|NOK|DKK|NZD|SGD|THB|MYR|PHP|IDR|VND)[\s\u00a0]?(\d{1,3}(,\d{3})*(\.\d{1,2})?|\d+(\.\d{1,2})?)/gi;
    function parsePrice(text) {
      if (!text) return null;
      PRICE_REGEX.lastIndex = 0;
      let match;
      const prices = [];
      while ((match = PRICE_REGEX.exec(text)) !== null) {
        let symbol = match[1];
        let value = parseFloat(match[3] || match[2]);
        prices.push({ symbol, value });
      }
      if (prices.length > 0) {
        return prices.find(p => p.value > 0) || prices[0];
      }
      return null;
    }
    function hasPrice(text) {
      if (!text) return false;
      PRICE_REGEX.lastIndex = 0;
      return PRICE_REGEX.test(text);
    }
    function findPriceInElement(element) {
      if (!element) return null;
      var offscreenEl = element.querySelector('.a-offscreen');
      if (offscreenEl) {
        var offscreenText = offscreenEl.textContent.trim();
        if (offscreenText && hasPrice(offscreenText)) {
          return parsePrice(offscreenText);
        }
      }
      var textContent = element.textContent.trim();
      if (textContent && hasPrice(textContent)) {
        return parsePrice(textContent);
      }
      return null;
    }
    const result1 = document.getElementById('result1');
    const priceEl1 = document.querySelector('.a-price');
    const priceData1 = findPriceInElement(priceEl1);
    result1.innerHTML = 'Element text: "' + priceEl1.textContent.trim() + '"<br>' +
      'Offscreen text: "' + priceEl1.querySelector('.a-offscreen').textContent.trim() + '"<br>' +
      'Result: ' + (priceData1 ? '<span class="success">' + priceData1.symbol + priceData1.value + '</span>' : '<span class="fail">NO MATCH</span>');
    const result2 = document.getElementById('result2');
    const priceEl2 = document.querySelectorAll('.a-price')[1];
    const priceData2 = findPriceInElement(priceEl2);
    result2.innerHTML = 'Element text: "' + priceEl2.textContent.trim() + '"<br>' +
      'Result: ' + (priceData2 ? '<span class="success">' + priceData2.symbol + priceData2.value + '</span>' : '<span class="fail">NO MATCH</span>');
    const result3 = document.getElementById('result3');
    document.querySelectorAll('.price').forEach(el => {
      const text = el.textContent;
      const data = parsePrice(text);
      const div = document.createElement('div');
      div.innerHTML = '"' + text + '" -> ' + (data ? '<span class="success">' + data.symbol + data.value + '</span>' : '<span class="fail">NO MATCH</span>');
      result3.appendChild(div);
    });
  </script>
</body>
</html>
